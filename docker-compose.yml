version: "3.9"

services:
  # ─── PostgreSQL Database ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: webpilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webpilot
      POSTGRES_PASSWORD: webpilot_pass
      POSTGRES_DB: webpilot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webpilot -d webpilot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Task Queue / Pub-Sub) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: webpilot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webpilot_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://webpilot:webpilot_pass@postgres:5432/webpilot_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - screenshots_data:/app/screenshots
      - downloads_data:/app/downloads
      - reports_data:/app/reports
      - logs_data:/app/logs
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ─── Frontend (React / Vite) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webpilot_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8001
      VITE_WS_BASE_URL: ws://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ─── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: webpilot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  screenshots_data:
  downloads_data:
  reports_data:
  logs_data:
